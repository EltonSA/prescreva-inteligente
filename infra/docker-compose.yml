version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prescreva-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prescrevadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
